<mat-card class="login-card">
    <mat-card-header>
        <mat-card-title>Portfolio Tracker</mat-card-title>
        <mat-card-subtitle>Sign in to your account</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
        <form (ngSubmit)="onSubmit()">
            <mat-form-field appearance="outline">
                <mat-label>Username</mat-label>
                <input matInput type="text" [(ngModel)]="username" name="username" required autocomplete="username" />
            </mat-form-field>
            <mat-form-field appearance="outline">
                <mat-label>Password</mat-label>
                <input matInput type="password" [ngModel]="password()" (ngModelChange)="password.set($event)"
                    name="password" required autocomplete="current-password" />
            </mat-form-field>

            <div class="error-message" *ngIf="errorMessage()">
                {{errorMessage()}}
            </div>

            <button mat-raised-button color="primary" type="submit">Login</button>
        </form>
    </mat-card-content>

    <mat-card-actions>
        <span>Demo credentials: admin/password</span>
    </mat-card-actions>
</mat-card>
