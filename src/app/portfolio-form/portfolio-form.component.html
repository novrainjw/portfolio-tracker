<mat-card class="portfolio-form-card">
    <mat-card-header>
        <mat-card-title>{{isEditMode()?'Edit Portfolio' : 'Create New Portfolio'}}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
        <form [formGroup]="portfolioForm" (ngSubmit)="onSubmit()">
            <mat-form-field appearance="outline">
                <mat-label>Portfolio Name</mat-label>
                <input matInput formControlName="name" placeholder="e.g., My Retirement Account">
                <mat-error *ngIf="portfolioForm.get('name')?.hasError('required')">
                    Name is required
                </mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Broker</mat-label>
                <input matInput formControlName="broker" placeholder="e.g., Questrade, Wealthsimple">
                <mat-error *ngIf="portfolioForm.get('broker')?.hasError('required')">
                    Broker is required
                </mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Currency</mat-label>
                <mat-select formControlName="currency">
                    <mat-option value="USD">USD</mat-option>
                    <mat-option value="CAD">CAD</mat-option>
                </mat-select>
                <mat-error *ngIf="portfolioForm.get('currency')?.hasError('required')">
                    Currency is required
                </mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Description (Optional)</mat-label>
                <textarea matInput formControlName="description" rows="3"></textarea>
            </mat-form-field>

            <div class="form-actions">
                <button mat-raised-button color="primary" type="submit" [disabled]="portfolioForm.invalid">
                    {{isEditMode()?'Update Portfolio':'Create Portfolio'}}
                </button>
                <button mat-button type="button" (click)="router.navigate(['/portfolios'])">
                    Cancel
                </button>
            </div>
        </form>
    </mat-card-content>
</mat-card>
