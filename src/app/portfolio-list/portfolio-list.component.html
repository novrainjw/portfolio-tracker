<mat-card class="portfolio-list-card">
    <mat-card-header>
        <mat-card-title>My Portfolios</mat-card-title>
        <mat-card-subtitle>Manage your investment accounts</mat-card-subtitle>
    </mat-card-header>


    <mat-card-content>
        <!-- <mat-card-actions> -->
            <div class="actions">
            <button mat-raised-button color="primary" routerLink="/portfolios/new">
                <mat-icon>add</mat-icon>Create New Portfolio
            </button>
            </div>
        <!-- </mat-card-actions> -->

        <table mat-table [dataSource]="portfolios()">
            <!-- Name Column -->
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef> Name </th>
                <td mat-cell *matCellDef="let portfolio">
                    <a [routerLink]="['/portfolios', portfolio.id]">{{ portfolio.name }}</a>
                </td>
            </ng-container>

            <!-- Broker Column -->
            <ng-container matColumnDef="broker">
                <th mat-header-cell *matHeaderCellDef> Broker </th>
                <td mat-cell *matCellDef="let portfolio">{{ portfolio.broker }}</td>
            </ng-container>

            <!-- Currency Column -->
            <ng-container matColumnDef="currency">
                <th mat-header-cell *matHeaderCellDef> Currency </th>
                <td mat-cell *matCellDef="let portfolio">{{ portfolio.currency }}</td>
            </ng-container>

            <!-- Created Date Column -->
            <ng-container matColumnDef="createdDate">
                <th mat-header-cell *matHeaderCellDef> Created </th>
                <td mat-cell *matCellDef="let portfolio">{{ portfolio.createdDate | date }}</td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef> Actions </th>
                <td mat-cell *matCellDef="let portfolio">
                    <button mat-icon-button [routerLink]="['/portfolios', portfolio.id, 'edit']">
                        <mat-icon color="accent">edit</mat-icon>
                    </button>
                    <button mat-icon-button color="warn" (click)="deletePortfolio(portfolio.id)">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

    </mat-card-content>
</mat-card>
